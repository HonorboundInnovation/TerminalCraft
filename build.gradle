plugins {
    id 'eclipse'
    id 'idea'
    id 'maven-publish'
    id 'net.minecraftforge.gradle' version '[6.0,6.2)'
}

version = mod_version
group = mod_group_id

base { archivesName = mod_id }
java.toolchain.languageVersion = JavaLanguageVersion.of(17)

println "Java: ${System.getProperty 'java.version'}, JVM: ${System.getProperty 'java.vm.version'} (${System.getProperty 'java.vendor'}), Arch: ${System.getProperty 'os.arch'}"

minecraft {
    mappings channel: mapping_channel, version: mapping_version
    copyIdeResources = true
    runs {
        configureEach {
            workingDirectory project.file('run')
            property 'forge.logging.markers', 'REGISTRIES'
            property 'forge.logging.console.level', 'debug'
            mods { "${mod_id}" { source sourceSets.main } }
        }
        client { property 'forge.enabledGameTestNamespaces', mod_id }
        server {
            property 'forge.enabledGameTestNamespaces', mod_id
            args '--nogui'
        }
        gameTestServer { property 'forge.enabledGameTestNamespaces', mod_id }
        data {
            workingDirectory project.file('run-data')
            args '--mod', mod_id, '--all', '--output', file('src/generated/resources/'), '--existing', file('src/main/resources/')
        }
    }
}

sourceSets.main.resources { srcDir 'src/generated/resources' }
def sophisticatedModsDir = providers.gradleProperty('terminalcraft.sophisticatedModsDir').orNull
def storageDrawersModsDir = providers.gradleProperty('terminalcraft.storageDrawersModsDir').orNull
def refinedStorageModsDir = providers.gradleProperty('terminalcraft.refinedStorageModsDir').orNull

// Optional-mod GameTests link their public API types and are compiled only for the matching
// focused profile. Production/minimal runtime remains free of test-class linkage to absent mods.
sourceSets.main.java {
    if (sophisticatedModsDir == null || sophisticatedModsDir.isBlank()) {
        exclude 'com/malice/terminalcraft/device/SophisticatedGenericItemCapabilityGameTests.java'
    }
    if (storageDrawersModsDir == null || storageDrawersModsDir.isBlank()) {
        exclude 'com/malice/terminalcraft/device/StorageDrawersCompatibilityGameTests.java'
    }
    if (refinedStorageModsDir == null || refinedStorageModsDir.isBlank()) {
        exclude 'com/malice/terminalcraft/device/RefinedStorageBridgeGameTests.java'
    }
}
repositories {
    maven { url = "https://cursemaven.com" }
    maven { url = "https://api.modrinth.com/maven" }
    if (sophisticatedModsDir != null && !sophisticatedModsDir.isBlank()) {
        flatDir { dirs sophisticatedModsDir }
    }
    if (storageDrawersModsDir != null && !storageDrawersModsDir.isBlank()) {
        flatDir { dirs storageDrawersModsDir }
    }
    if (refinedStorageModsDir != null && !refinedStorageModsDir.isBlank()) {
        flatDir { dirs refinedStorageModsDir }
    }
}

dependencies {
    minecraft "net.minecraftforge:forge:${minecraft_version}-${forge_version}"

    // Public compile-time APIs only; these mods remain optional and are never bundled.
    compileOnly fg.deobf("curse.maven:sophisticated-core-618298:7870062")
    compileOnly fg.deobf("curse.maven:sophisticated-storage-619320:7865058")
    compileOnly fg.deobf("curse.maven:sophisticated-backpacks-422301:7853013")
    compileOnly fg.deobf("curse.maven:storage-drawers-223852:6994481")
    compileOnly fg.deobf("maven.modrinth:refined-storage:1.12.4")

    // Optional local focused profile. No Sophisticated artifact is bundled or required by default.
    if (sophisticatedModsDir != null && !sophisticatedModsDir.isBlank()) {
        def requiredModules = ['sophisticatedcore', 'sophisticatedstorage', 'sophisticatedbackpacks']
        requiredModules.each { module ->
            def matches = fileTree(sophisticatedModsDir) { include "${module}-1.20.1-*.jar" }.files.toList().sort()
            if (matches.size() != 1) {
                throw new GradleException("Expected exactly one ${module}-1.20.1-*.jar in ${sophisticatedModsDir}, found ${matches.size()}")
            }
            def fileName = matches.first().name
            def moduleVersion = fileName.substring(module.length() + 1, fileName.length() - 4)
            runtimeOnly fg.deobf("terminalcraft.focused:${module}:${moduleVersion}")
        }
    }

    // Optional focused Storage Drawers runtime; the instance remains read-only.
    if (storageDrawersModsDir != null && !storageDrawersModsDir.isBlank()) {
        def matches = fileTree(storageDrawersModsDir) {
            include 'StorageDrawers-forge-1.20.1-*.jar'
        }.files.toList().sort()
        if (matches.size() != 1) {
            throw new GradleException("Expected exactly one StorageDrawers-forge-1.20.1-*.jar in ${storageDrawersModsDir}, found ${matches.size()}")
        }
        def fileName = matches.first().name
        def moduleVersion = fileName.substring('StorageDrawers-forge-'.length(), fileName.length() - 4)
        runtimeOnly fg.deobf("terminalcraft.focused:StorageDrawers-forge:${moduleVersion}")
    }
    // Optional focused Refined Storage 1.12.4 runtime; never bundled or required by default.
    if (refinedStorageModsDir != null && !refinedStorageModsDir.isBlank()) {
        def matches = fileTree(refinedStorageModsDir) { include 'refinedstorage-1.12.4.jar' }.files.toList().sort()
        if (matches.size() != 1) {
            throw new GradleException("Expected exactly one refinedstorage-1.12.4.jar in ${refinedStorageModsDir}, found ${matches.size()}")
        }
        runtimeOnly fg.deobf("terminalcraft.focused:refinedstorage:1.12.4")
    }

}

tasks.named('processResources', ProcessResources).configure {
    var replaceProperties = [
            minecraft_version: minecraft_version, minecraft_version_range: minecraft_version_range,
            forge_version: forge_version, forge_version_range: forge_version_range,
            loader_version_range: loader_version_range,
            mod_id: mod_id, mod_name: mod_name, mod_license: mod_license, mod_version: mod_version,
            mod_authors: mod_authors, mod_description: mod_description,
    ]
    inputs.properties replaceProperties
    filesMatching(['META-INF/mods.toml', 'pack.mcmeta']) {
        expand replaceProperties + [project: project]
    }
}

tasks.named('jar', Jar).configure {
    manifest {
        attributes([
                'Specification-Title': mod_id,
                'Specification-Vendor': mod_authors,
                'Specification-Version': '1',
                'Implementation-Title': project.name,
                'Implementation-Version': project.jar.archiveVersion,
                'Implementation-Vendor': mod_authors,
                'Implementation-Timestamp': new Date().format("yyyy-MM-dd'T'HH:mm:ssZ")
        ])
    }
    finalizedBy 'reobfJar'
}

publishing {
    publications { register('mavenJava', MavenPublication) { artifact jar } }
    repositories { maven { url "file://${project.projectDir}/mcmodsrepo" } }
}

tasks.withType(JavaCompile).configureEach { options.encoding = 'UTF-8' }

